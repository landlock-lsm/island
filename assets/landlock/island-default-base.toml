# Default base Landlock configuration generated by `island create`
#
# This file should not be modified directly but copied in a new sibling file and
# updated according to programs' and users' needs.  In sibling files, the abi
# variable and the [[ruleset]] section should at least be a subset of the ones
# defined here to not lose the default protections for compatibility reasons.

abi = 6

# Deny every handled access by default.
[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System executables.
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = [
    "/bin",
    "/lib",
    "/sbin",
    "/usr",
]

# Safe writable devices.
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "/dev/full",
    "/dev/null",
    "/dev/random",
    "/dev/urandom",
    "/dev/zero",
]

# System configuration files.
[[path_beneath]]
allowed_access = [
    "read_dir",
    "read_file",
    "refer",
]
parent = ["/etc"]
