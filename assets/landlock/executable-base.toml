# Executable and library access rules generated by `island create --with-executables`
#
# This file grants read and execute access to the specified binary and its
# dynamically linked libraries.

abi = 6

# Handle all filesystem and network access, deny by default.
[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = []
